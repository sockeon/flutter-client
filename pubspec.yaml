name: sockeon
description: Dart and Flutter client for the Sockeon real-time WebSocket framework, with event-based messaging, rooms, namespaces and auto-reconnect.
version: 1.0.1
homepage: https://sockeon.github.io
repository: https://github.com/sockeon/flutter-client
issue_tracker: https://github.com/sockeon/flutter-client/issues

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  web_socket_channel: ^3.0.1

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
